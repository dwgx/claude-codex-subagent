name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate manifest, frontmatter, scripts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate plugin.json is valid JSON
        run: |
          python3 -c "import json, sys; json.load(open('.claude-plugin/plugin.json')); print('plugin.json: OK')"

      - name: Validate SKILL.md has YAML frontmatter
        run: |
          python3 <<'PY'
          import sys
          try:
              import yaml
          except ImportError:
              import subprocess
              subprocess.check_call([sys.executable, "-m", "pip", "install", "-q", "pyyaml"])
              import yaml
          path = "skills/codex-subagent/SKILL.md"
          content = open(path, encoding="utf-8").read()
          if not content.startswith("---"):
              print(f"FAIL: {path} missing opening frontmatter delimiter", file=sys.stderr)
              sys.exit(1)
          end = content.find("\n---", 3)
          if end == -1:
              print(f"FAIL: {path} missing closing frontmatter delimiter", file=sys.stderr)
              sys.exit(1)
          fm = yaml.safe_load(content[3:end])
          required = ["name", "description"]
          for k in required:
              if k not in fm:
                  print(f"FAIL: {path} frontmatter missing required key '{k}'", file=sys.stderr)
                  sys.exit(1)
          print(f"{path}: frontmatter OK (name={fm['name']})")
          PY

      - name: Validate all persona files
        run: |
          python3 <<'PY'
          import os, sys
          try:
              import yaml
          except ImportError:
              import subprocess
              subprocess.check_call([sys.executable, "-m", "pip", "install", "-q", "pyyaml"])
              import yaml
          bad = 0
          allowed_sandbox = {"workspace-write", "read-only", "danger-full-access", "bypass", "full-auto"}
          allowed_effort = {"low", "medium", "high", "default"}
          for fn in sorted(os.listdir("personas")):
              if not fn.endswith(".md") or fn == "README.md":
                  continue
              path = os.path.join("personas", fn)
              content = open(path, encoding="utf-8").read()
              if not content.startswith("---"):
                  print(f"FAIL: {path} missing frontmatter", file=sys.stderr)
                  bad += 1
                  continue
              end = content.find("\n---", 3)
              if end == -1:
                  print(f"FAIL: {path} unclosed frontmatter", file=sys.stderr)
                  bad += 1
                  continue
              fm = yaml.safe_load(content[3:end])
              for k in ("persona", "sandbox", "effort", "when-to-use"):
                  if k not in fm:
                      print(f"FAIL: {path} frontmatter missing '{k}'", file=sys.stderr)
                      bad += 1
              if fm.get("sandbox") not in allowed_sandbox:
                  print(f"FAIL: {path} sandbox must be one of {sorted(allowed_sandbox)}", file=sys.stderr)
                  bad += 1
              if fm.get("effort") not in allowed_effort:
                  print(f"FAIL: {path} effort must be one of {sorted(allowed_effort)}", file=sys.stderr)
                  bad += 1
              if "{{TASK}}" not in content:
                  print(f"FAIL: {path} missing {{TASK}} placeholder", file=sys.stderr)
                  bad += 1
              else:
                  print(f"{path}: OK")
          if bad:
              sys.exit(1)
          PY

      - name: Validate public prompt guidance
        run: |
          python3 <<'PY'
          import pathlib
          import re
          import sys

          guide = pathlib.Path("docs/prompt-and-agent-patterns.md")
          if not guide.exists():
              print("FAIL: docs/prompt-and-agent-patterns.md is missing", file=sys.stderr)
              sys.exit(1)

          text = guide.read_text(encoding="utf-8")
          required_headings = [
              "## Public Boundary",
              "## Instruction Surfaces",
              "## Prompt Contract",
              "## XML Block Template",
              "## Agent Design",
              "## Skill Design",
              "## Persona Design",
              "## Command Design",
              "## Public Release Checklist",
          ]
          missing = [heading for heading in required_headings if heading not in text]
          if missing:
              print("FAIL: prompt guide missing headings: " + ", ".join(missing), file=sys.stderr)
              sys.exit(1)

          public_docs = [
              pathlib.Path("AGENTS.md"),
              pathlib.Path("CLAUDE.md"),
              pathlib.Path("README.md"),
              pathlib.Path("INSTALL.md"),
              pathlib.Path("CONTRIBUTING.md"),
              pathlib.Path("SECURITY.md"),
              pathlib.Path("CHANGELOG.md"),
              *pathlib.Path("docs").glob("*.md"),
              *pathlib.Path("examples").glob("*.md"),
              *pathlib.Path("personas").glob("*.md"),
              pathlib.Path("skills/codex-subagent/SKILL.md"),
          ]
          forbidden = [
              re.compile(r"C:\\Users\\[^\\\s`]+", re.IGNORECASE),
              re.compile(r"D:\\(?!path\\to\\repo\b)[^\\\s`]+", re.IGNORECASE),
              re.compile(r"OPENAI_API_KEY\s*=\s*[A-Za-z0-9_\-]{8,}"),
              re.compile(r"CODEX_API_KEY\s*=\s*[A-Za-z0-9_\-]{8,}"),
          ]
          bad = []
          for path in public_docs:
              if not path.exists():
                  continue
              content = path.read_text(encoding="utf-8")
              for pattern in forbidden:
                  match = pattern.search(content)
                  if match:
                      bad.append(f"{path}: {match.group(0)}")
          if bad:
              print("FAIL: public docs contain machine-specific or secret-looking values:", file=sys.stderr)
              for item in bad:
                  print("  " + item, file=sys.stderr)
              sys.exit(1)

          print("prompt guide and public-doc hygiene: OK")
          PY

      - name: Validate wrapper precedence and usage errors
        run: |
          bash scripts/test-dispatch-wrapper.sh

      - name: shellcheck scripts
        run: |
          sudo apt-get update -qq && sudo apt-get install -qq -y shellcheck
          shellcheck scripts/*.sh
          echo "shellcheck: OK"

      - name: Check SKILL.md line count (soft limit)
        run: |
          lines=$(wc -l < skills/codex-subagent/SKILL.md)
          echo "SKILL.md is $lines lines"
          if [ "$lines" -gt 600 ]; then
            echo "WARN: SKILL.md is over 600 lines; consider splitting reference material into subfiles"
          fi
